function levelMap(r) {
  r = r.toLowerCase();
  const all = ["A1","A2","B1","B1+","B2","C1"];
  if (r.includes("all") || r.includes("any")) return [...all];
  const out = [];
  if (r.includes("a1") || r.includes("beginner")) out.push("A1");
  if (r.includes("a2") || r.includes("elementary")) { if(!out.includes("A2")) out.push("A2"); }
  if (r.includes("pre-intermediate") || r.includes("pre intermediate")) { if(!out.includes("B1")) out.push("B1"); }
  if (r.includes("b1+") || r.includes("b1 +")) { if(!out.includes("B1+")) out.push("B1+"); }
  else if (r.includes("b1") && !r.includes("b1+") && !r.includes("b1 ")) { if(!out.includes("B1")) out.push("B1"); }
  if ((r.includes("intermediate") && !r.includes("pre") && !r.includes("upper")) && !out.includes("B1+")) out.push("B1+");
  if (r.includes("b2") || r.includes("upper-intermediate") || r.includes("upper intermediate")) { if(!out.includes("B2")) out.push("B2"); }
  if (r.includes("c1") || r.includes("advanced")) { if(!out.includes("C1")) out.push("C1"); }
  if ((r.includes("and above") || r.includes("+")) && out.length) {
    const minIdx = all.indexOf(out[0]);
    if (minIdx >= 0) return all.filter((_,i) => i >= minIdx);
  }
  if (r.includes(" to ") && out.length >= 2) {
    const minI = all.indexOf(out[0]);
    const maxI = all.indexOf(out[out.length-1]);
    if (minI >= 0 && maxI >= 0) return all.filter((_,i) => i >= minI && i <= maxI);
  }
  return out.length ? out : [...all];
}
function inferAim(ch, goals) {

  if (ch===9) return "pronunciation";

  if (ch===11) return "assessment";
  if (ch===2) return "community";

  if (g.includes("learner train")||g.includes("autonomy")||g.includes("training")) return "learner";
  if (g.includes("motivat")||g.includes("fun")) return "learner";
  if (g.includes("information gather")||g.includes("needs analysis")) return "management";
  return "community";
}

const ACTIVITIES = ACTIVITIES_RAW.map(a => ({...a, levels: levelMap(a.lr), aim: inferAim(a.ch, a.goals)}));
const state = {chapters:new Set(), levels:new Set(), aim:null, stage:null, search:"", expanded:null};

function getFiltered() {
  const q = state.search.trim().toLowerCase();
  return ACTIVITIES.filter(a => {
    if (state.chapters.size > 0 && !state.chapters.has(a.ch)) return false;
    if (state.levels.size > 0 && !a.levels.some(l => state.levels.has(l))) return false;
    if (state.aim && a.aim !== state.aim) return false;
    if (state.stage && a.stage !== state.stage) return false;
    if (q) { const hay = (a.title+" "+a.goals+" "+a.focus+" "+a.lr).toLowerCase(); if (!hay.includes(q)) return false; }
    return true;
  });
}

function render() {
  state.search = document.getElementById("search").value;
  const filtered = getFiltered();
  document.getElementById("count").textContent = filtered.length;
  const parts = [];
  if (state.chapters.size) parts.push("Ch: "+[...state.chapters].join(", "));
  if (state.levels.size)   parts.push("Level: "+[...state.levels].join(" & "));
  if (state.aim)           parts.push("Aim: "+AIM_GROUPS.find(a=>a.id===state.aim)?.label);
  if (state.stage)         parts.push("Stage: "+STAGE_GROUPS.find(s=>s.id===state.stage)?.label);
  document.getElementById("results-desc").textContent =
    (filtered.length===1?"activity found":"activities found")+(parts.length?" \u2014 "+parts.join(" \u00b7 "):"");
  const container = document.getElementById("cards-container");
  if (filtered.length===0) { container.innerHTML='<div class="empty">No activities match your filters. Try broadening your search.</div>'; return; }
  container.innerHTML = filtered.map(a=>cardHTML(a)).join("");
  document.getElementById("footer").textContent =
    ACTIVITIES.length+" activities \u00b7 Language Learning with Technology, Cambridge University Press \u00b7 Graham Stanley";
}

function cardHTML(a) {
  const col = CHAPTER_COLORS[a.ch-1];
  const chap = CHAPTERS.find(c=>c.id===a.ch);
  const aimObj = AIM_GROUPS.find(g=>g.id===a.aim);
  const stageObj = STAGE_GROUPS.find(s=>s.id===a.stage);
  const aimColor = aimObj?aimObj.color:"#444";
  const stageColor = stageObj?stageObj.color:"#666";
  const levelLabel = a.levels.length>=6?"All levels":a.levels.join(" \u00b7 ");
  const isOpen = state.expanded===a.id;
  return `<div class="card${isOpen?" open":""}" onclick="toggleCard('${a.id}')">
    <div class="card-header">
      <div class="id-badge" style="background:${col}">${a.id}</div>
      <div class="card-body">
        <div class="card-title-row">
          <span class="card-title">${a.title}</span>
          <span class="card-chapter-tag" style="color:${col}">Ch.${a.ch} ${chap.short}</span>
        </div>
        <div class="card-focus">${a.focus}</div>
        <div class="card-meta">
          <span class="badge badge-level">${levelLabel}</span>
          <span class="badge badge-time">\u23f1 ${a.time}</span>
          <span class="badge" style="background:${aimColor}18;border-color:${aimColor}55;color:${aimColor}">${aimObj?aimObj.label:a.aim}</span>
          <span class="badge" style="background:${stageColor}14;border-color:${stageColor}44;color:${stageColor}">${stageObj?stageObj.label:a.stage}</span>
        </div>
        ${isOpen?`<div class="card-detail" style="display:block">
          <div class="card-goals"><strong>Main goals:</strong> ${a.goals}</div>
          <div class="card-level-raw"><strong>Level:</strong> ${a.lr}</div>
        </div>`:`<div class="card-detail"></div>`}
      </div>
      <div class="chevron">\u25be</div>
    </div>
  </div>`;
}

function toggleCard(id) { state.expanded = state.expanded===id?null:id; render(); }

function buildChapterPills() {
  document.getElementById("chapter-pills").innerHTML =
    CHAPTERS.map(c=>{const col=CHAPTER_COLORS[c.id-1];
      return `<button class="pill" data-ch="${c.id}" style="border-color:${col};color:${col}" onclick="toggleChapter(${c.id})">${c.id}. ${c.short}</button>`;
    }).join("")+`<button class="clear-btn" id="ch-clear" onclick="clearChapters()">\u2715 Clear</button>`;
}
function buildLevelPills() {
  document.getElementById("level-pills").innerHTML =
    LEVELS_DEF.map(l=>`<button class="pill" data-lev="${l.id}" style="border-color:#2C5282;color:#2C5282" onclick="toggleLevel('${l.id}')">${l.label}</button>`).join("")+
    `<button class="clear-btn" id="lev-clear" onclick="clearLevels()">\u2715 Clear</button>`;
}
function buildAimPills() {
  document.getElementById("aim-pills").innerHTML =
    AIM_GROUPS.map(ag=>`<button class="pill" data-aim="${ag.id}" style="border-color:${ag.color};color:${ag.color}" onclick="toggleAim('${ag.id}')">${ag.label}</button>`).join("")+
    `<button class="clear-btn" id="aim-clear" onclick="clearAim()">\u2715 Clear</button>`;
}
function buildStagePills() {
  document.getElementById("stage-pills").innerHTML =
    STAGE_GROUPS.map(sg=>`<button class="pill" data-stage="${sg.id}" style="border-color:${sg.color};color:${sg.color}" onclick="toggleStage('${sg.id}')">${sg.label}</button>`).join("")+
    `<button class="clear-btn" id="stage-clear" onclick="clearStage()">\u2715 Clear</button>`;
}

function updatePillStyles() {
  document.querySelectorAll("[data-ch]").forEach(btn=>{
    const id=parseInt(btn.dataset.ch); const col=CHAPTER_COLORS[id-1];
    if(state.chapters.has(id)){btn.style.background=col;btn.style.color="#fff";btn.classList.add("active");}
    else{btn.style.background="transparent";btn.style.color=col;btn.classList.remove("active");}
  });
  document.getElementById("ch-clear").style.display=state.chapters.size?"inline-block":"none";

  document.querySelectorAll("[data-lev]").forEach(btn=>{
    const id=btn.dataset.lev;
    if(state.levels.has(id)){btn.style.background="#2C5282";btn.style.color="#fff";btn.classList.add("active");}
    else{btn.style.background="transparent";btn.style.color="#2C5282";btn.classList.remove("active");}
  });
  document.getElementById("lev-clear").style.display=state.levels.size?"inline-block":"none";

  document.querySelectorAll("[data-aim]").forEach(btn=>{
    const id=btn.dataset.aim; const ag=AIM_GROUPS.find(a=>a.id===id); if(!ag) return;
    if(state.aim===id){btn.style.background=ag.color;btn.style.color="#fff";btn.classList.add("active");}
    else{btn.style.background="transparent";btn.style.color=ag.color;btn.classList.remove("active");}
  });
  document.getElementById("aim-clear").style.display=state.aim?"inline-block":"none";

  document.querySelectorAll("[data-stage]").forEach(btn=>{
    const id=btn.dataset.stage; const sg=STAGE_GROUPS.find(s=>s.id===id); if(!sg) return;
    if(state.stage===id){btn.style.background=sg.color;btn.style.color="#fff";btn.classList.add("active");}
    else{btn.style.background="transparent";btn.style.color=sg.color;btn.classList.remove("active");}
  });
  document.getElementById("stage-clear").style.display=state.stage?"inline-block":"none";
}

function toggleChapter(id){if(state.chapters.has(id))state.chapters.delete(id);else state.chapters.add(id);updatePillStyles();render();}
function clearChapters(){state.chapters.clear();updatePillStyles();render();}
function toggleLevel(id){if(state.levels.has(id))state.levels.delete(id);else state.levels.add(id);updatePillStyles();render();}
function clearLevels(){state.levels.clear();updatePillStyles();render();}
function toggleAim(id){state.aim=state.aim===id?null:id;updatePillStyles();render();}
function clearAim(){state.aim=null;updatePillStyles();render();}
function toggleStage(id){state.stage=state.stage===id?null:id;updatePillStyles();render();}
function clearStage(){state.stage=null;updatePillStyles();render();}

buildChapterPills();buildLevelPills();buildAimPills();buildStagePills();updatePillStyles();render();
</script>
